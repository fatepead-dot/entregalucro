  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0D0F14;--card:#151820;--border:#1E2330;--accent:#F5A623;--green:#2ECC71;--red:#E74C3C;--blue:#3498DB;--purple:#9B59B6;--text:#E8ECF0;--muted:#6B7A99;--input:#1A1F2E}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
    #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    #header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 18px 12px;position:sticky;top:0;z-index:100}
    #header-inner{display:flex;align-items:center;gap:10px}
    .h-title{font-size:18px;font-weight:800;line-height:1}
    .h-sub{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px}
    .badge-count{margin-left:auto;background:var(--accent);color:#000;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700}
    #content{flex:1;overflow-y:auto;padding:20px 16px 100px}
    #nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 max(12px,env(safe-area-inset-bottom));z-index:200}
    .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 6px}
    .nav-icon{font-size:19px}
    .nav-label{font-size:9px;font-weight:700;color:var(--muted)}
    .nav-btn.active .nav-label{color:var(--accent)}
    .nav-btn:not(.active) .nav-icon{filter:grayscale(1) opacity(0.45)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
    .stat-row{display:flex;gap:10px;flex-wrap:wrap}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;flex:1;min-width:100px}
    .stat-label{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
    .stat-value{font-size:22px;font-weight:800;margin-top:6px;line-height:1}
    .stat-sub{color:var(--muted);font-size:12px;margin-top:4px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group.full{grid-column:1/-1}
    label{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
    input,select{background:var(--input);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:15px;outline:none;width:100%;appearance:none;-webkit-appearance:none}
    input::placeholder{color:var(--muted)}
    .btn{border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;width:100%;margin-top:4px;transition:opacity .15s}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .btn-accent{background:var(--accent);color:#000}
    .btn-green{background:var(--green);color:#fff}
    .btn-red-outline{background:transparent;border:1.5px solid var(--red);color:var(--red)}
    .btn-sm{padding:8px 16px;font-size:13px;width:auto;margin-top:0}
    .result-box{border-radius:14px;padding:18px;margin-top:8px}
    .result-box.ok{background:rgba(46,204,113,.08);border:1px solid var(--green)}
    .result-box.fail{background:rgba(231,76,60,.08);border:1px solid var(--red)}
    .result-title{font-size:20px;font-weight:800;margin-bottom:12px}
    .result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
    .preview-bar{border-radius:12px;padding:12px 16px;display:flex;justify-content:space-around;align-items:center;margin-top:4px}
    .preview-bar.ok{background:rgba(46,204,113,.06);border:1px solid var(--green)}
    .preview-bar.fail{background:rgba(231,76,60,.06);border:1px solid var(--red)}
    .pv-item{text-align:center}
    .pv-label{color:var(--muted);font-size:11px}
    .pv-val{font-weight:700;font-size:15px}
    .hist-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
    .plat-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
    .info-box{background:rgba(245,166,35,.08);border:1px solid var(--accent);border-radius:12px;padding:12px 16px;font-size:13px;line-height:1.6}
    .info-box-blue{background:rgba(52,152,219,.08);border:1px solid var(--blue);border-radius:12px;padding:12px 16px;font-size:13px;line-height:1.7;color:var(--muted)}
    .bar-wrap{background:var(--input);border-radius:4px;height:6px}
    .bar-fill{border-radius:4px;height:6px;transition:width .4s}
    .prog-wrap{background:var(--input);border-radius:6px;height:8px;margin-top:6px}
    .prog-fill{border-radius:6px;height:8px;transition:width .5s}
    .gap-16{display:flex;flex-direction:column;gap:16px}
    .gap-20{display:flex;flex-direction:column;gap:20px}
    .section-title{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .empty{text-align:center;color:var(--muted);padding:60px 20px}
    .empty-icon{font-size:48px}
    .empty-title{font-size:18px;font-weight:700;color:var(--text);margin-top:12px}
    .filter-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .tip{color:var(--accent);font-size:13px;margin-top:10px}
    .alerta-card{border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
    .alerta-ok{background:rgba(46,204,113,.07);border:1px solid var(--green)}
    .alerta-warn{background:rgba(245,166,35,.07);border:1px solid var(--accent)}
    .alerta-over{background:rgba(231,76,60,.07);border:1px solid var(--red)}
    .timer-display{font-size:52px;font-weight:800;text-align:center;letter-spacing:2px;color:var(--accent);line-height:1}
    .timer-running{animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.65}}
    .dia-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .dia-item{background:var(--input);border-radius:12px;padding:12px;text-align:center}
    .dia-val{font-size:18px;font-weight:800;margin-top:4px}
    #install-banner{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--accent);color:#000;padding:12px 18px;z-index:300;text-align:center;font-weight:700;font-size:14px;cursor:pointer}
  </style>

<div id="app">

<script>
const PLATFORMS=[
  {id:"uber",label:"Uber Flash",color:"#000",bg:"#FFF",emoji:"⚡"},
  {id:"ifood",label:"iFood",color:"#FFF",bg:"#EA1D2C",emoji:"🔴"},
  {id:"rappi",label:"Rappi",color:"#FFF",bg:"#FF441F",emoji:"🟠"},
  {id:"loggi",label:"Loggi",color:"#FFF",bg:"#6C3CE1",emoji:"🟣"},
  {id:"99foods",label:"99Foods",color:"#000",bg:"#FFD600",emoji:"🟡"},
  {id:"lalamove",label:"Lalamove",color:"#FFF",bg:"#FF6600",emoji:"🚛"},
  {id:"outro",label:"Outro",color:"#FFF",bg:"#6B7A99",emoji:"📦"},
];
const TIPOS=["Entrega simples","Corrida casada","Supermercado","Farmácia","Restaurante","Logística/Pacote"];
const PREVENTIVOS=[
  {id:"oleo",label:"Troca de óleo",kmIntervalo:5000,emoji:"🛢️"},
  {id:"filtro",label:"Filtro de ar",kmIntervalo:10000,emoji:"💨"},
  {id:"pneus",label:"Rodízio de pneus",kmIntervalo:8000,emoji:"🔄"},
  {id:"freios",label:"Verificar freios",kmIntervalo:15000,emoji:"🛑"},
  {id:"correia",label:"Correia dentada",kmIntervalo:40000,emoji:"⚙️"},
  {id:"velas",label:"Velas de ignição",kmIntervalo:20000,emoji:"⚡"},
  {id:"alinhamento",label:"Alinhamento/balanceamento",kmIntervalo:10000,emoji:"🎯"},
];
const CAT_GASTOS=["Combustível","Manutenção","Pneu","Freios","Óleo","Seguro","IPVA/DPVAT","Multa","Lavagem","Outros"];
const DIAS_SEMANA=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

let state={
  tab:"dash",corridas:[],gastos:[],kmAtual:0,
  custoKm:0.65,custoFixoDia:25,metaDiaria:150,metaMensal:3000,
  calc:{km:"",valor:"",espera:"0",corridas:"1",plat:"uber"},
  reg:{data:today(),hora:nowHour(),plat:"uber",tipo:"Entrega simples",km:"",valorBruto:"",gorjeta:"0",espera:"0",paradas:"1",obs:""},
  regGasto:{data:today(),categoria:"Combustível",desc:"",valor:"",km:""},
  hist:{filtro:"todas",periodo:"7"},
  timer:{rodando:false,inicio:null,pausado:0,corridaAtiva:{plat:"uber",tipo:"Entrega simples",km:"",valor:""}},
};

function today(){return new Date().toISOString().split("T")[0];}
function nowHour(){const h=new Date();return String(h.getHours()).padStart(2,"0")+":"+String(h.getMinutes()).padStart(2,"0");}
function brl(v){return "R$ "+Number(v||0).toFixed(2).replace(".",",");}
function kmStr(v){return Number(v||0).toFixed(1).replace(".",",")+" km";}
function platObj(id){return PLATFORMS.find(p=>p.id===id)||PLATFORMS[6];}
function platBadge(id){
  const p=platObj(id);
  const b=p.bg==="#FFF"||p.bg==="#FFFFFF"?"border:1px solid #ccc;":"";
  return `<span class="plat-badge" style="background:${p.bg};color:${p.color};${b}">${p.emoji} ${p.label}</span>`;
}
function fmtSecs(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return (h>0?String(h).padStart(2,"0")+":":"")+String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0");}
function mesAtual(){return new Date().toISOString().slice(0,7);}
function saudacao(){const h=new Date().getHours();return h<12?"Bom dia! ☀️":h<18?"Boa tarde! 🌤️":"Boa noite! 🌙";}

// STORAGE
function save(){
  try{
    localStorage.setItem("el_corridas",JSON.stringify(state.corridas));
    localStorage.setItem("el_gastos",JSON.stringify(state.gastos));
    localStorage.setItem("el_config",JSON.stringify({custoKm:state.custoKm,custoFixoDia:state.custoFixoDia,kmAtual:state.kmAtual,metaDiaria:state.metaDiaria,metaMensal:state.metaMensal}));
  }catch(e){}
}
function load(){
  try{
    const c=localStorage.getItem("el_corridas");
    const g=localStorage.getItem("el_gastos");
    const cfg=localStorage.getItem("el_config");
    if(c) state.corridas=JSON.parse(c);
    if(g) state.gastos=JSON.parse(g);
    if(cfg){const o=JSON.parse(cfg);state.custoKm=o.custoKm||0.65;state.custoFixoDia=o.custoFixoDia||25;state.kmAtual=o.kmAtual||0;state.metaDiaria=o.metaDiaria||150;state.metaMensal=o.metaMensal||3000;}
  }catch(e){}
}

// NAVEGAÇÃO
const TAB_TITLES={dash:"Início",timer:"Timer de Corrida",calc:"Calculadora Rápida",reg:"Nova Corrida",hist:"Histórico",analise:"Análise & Insights",gastos:"Gastos & Manutenção",cfg:"Configurações"};
function goTab(t){
  state.tab=t;
  document.querySelectorAll(".nav-btn").forEach((b,i)=>{
    b.classList.toggle("active",["dash","timer","calc","reg","hist","analise","gastos","cfg"][i]===t);
  });
  document.getElementById("tab-title").textContent=TAB_TITLES[t];
  render();
}
function render(){
  const cnt=state.corridas.length;
  const badge=document.getElementById("badge-count");
  if(cnt>0){badge.style.display="";badge.textContent=cnt+" corridas";}else badge.style.display="none";
  const el=document.getElementById("content");
  const renders={dash:renderDash,timer:renderTimer,calc:renderCalc,reg:renderReg,hist:renderHist,analise:renderAnalise,gastos:renderGastos,cfg:renderCfg};
  el.innerHTML=renders[state.tab]();
}

// DASHBOARD
function renderDash(){
  const hoje=today(),mes=mesAtual();
  const corridasHoje=state.corridas.filter(c=>c.data===hoje);
  const corridasMes=state.corridas.filter(c=>c.data.startsWith(mes));
  const lucroHoje=corridasHoje.reduce((s,c)=>s+c.lucro,0);
  const lucroMes=corridasMes.reduce((s,c)=>s+c.lucro,0);
  const gastosMes=state.gastos.filter(g=>g.data.startsWith(mes)).reduce((s,g)=>s+g.valor,0);
  const lucroRealMes=lucroMes-gastosMes;
  const pctDia=Math.min(100,state.metaDiaria>0?lucroHoje/state.metaDiaria*100:0);
  const pctMes=Math.min(100,state.metaMensal>0?lucroMes/state.metaMensal*100:0);
  const corDia=pctDia>=100?"var(--green)":pctDia>=60?"var(--accent)":"var(--blue)";
  const corMes=pctMes>=100?"var(--green)":pctMes>=60?"var(--accent)":"var(--blue)";
  const kmHoje=corridasHoje.reduce((s,c)=>s+c.km,0);
  const melhorHoje=corridasHoje.length>0?Math.max(...corridasHoje.map(c=>c.lucro)):0;
  const ultimas=state.corridas.slice(0,3);
  return `
  <div class="gap-20">
    <div style="padding:4px 0 0">
      <div style="font-size:22px;font-weight:800">${saudacao()}</div>
      <div style="color:var(--muted);font-size:13px;margin-top:2px">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})} 🚚</div>
    </div>
    <div class="card">
      <div class="section-title">🎯 Suas metas</div>
      <div style="margin-bottom:14px">

// TIMER
let timerInterval=null;
function timerSecs(){if(!state.timer.rodando) return state.timer.pausado;return state.timer.pausado+Math.floor((Date.now()-state.timer.inicio)/1000);}
function renderTimer(){
  const secs=timerSecs();
  const platOpts=PLATFORMS.map(p=>`<option value="${p.id}"${state.timer.corridaAtiva.plat===p.id?" selected":""}>${p.emoji} ${p.label}</option>`).join("");
  const tipoOpts=TIPOS.map(t=>`<option${state.timer.corridaAtiva.tipo===t?" selected":""}>${t}</option>`).join("");
  return `
  <div class="gap-20">
    <div class="card" style="text-align:center;padding:30px 20px">
      <div class="timer-display${state.timer.rodando?" timer-running":""}" id="timer-display">${fmtSecs(secs)}</div>
      <div style="color:var(--muted);font-size:13px;margin-top:8px">${state.timer.rodando?"⏳ Corrida em andamento...":"⏸️ Parado"}</div>
    </div>
    <div style="display:flex;gap:10px">
      ${!state.timer.rodando?`<button class="btn btn-green" style="flex:1" onclick="timerStart()">▶️ Iniciar corrida</button>`:`<button class="btn btn-red-outline" style="flex:1" onclick="timerStop()">⏸️ Pausar</button>`}
      ${secs>0?`<button class="btn btn-red-outline btn-sm" onclick="timerReset()">🔄 Reset</button>`:""}
    </div>
    <div class="card">
      <div class="section-title">📦 Dados da corrida</div>
      <div class="form-grid">
        <div class="form-group"><label>Plataforma</label><select oninput="state.timer.corridaAtiva.plat=this.value">${platOpts}</select></div>
        <div class="form-group"><label>Tipo</label><select oninput="state.timer.corridaAtiva.tipo=this.value">${tipoOpts}</select></div>
        <div class="form-group"><label>Km percorridos</label><input type="number" value="${state.timer.corridaAtiva.km}" placeholder="Ex: 8.5" oninput="state.timer.corridaAtiva.km=this.value"></div>
        <div class="form-group"><label>Valor recebido (R$)</label><input type="number" value="${state.timer.corridaAtiva.valor}" placeholder="Ex: 22.00" oninput="state.timer.corridaAtiva.valor=this.value"></div>
      </div>
    </div>
    ${secs>0&&state.timer.corridaAtiva.km&&state.timer.corridaAtiva.valor?`<button class="btn btn-accent" onclick="timerSalvar()">💾 Finalizar e salvar corrida (${fmtSecs(secs)})</button>`:""}
  </div>`;
}
function timerStart(){
  if(state.timer.rodando) return;
  state.timer.rodando=true;state.timer.inicio=Date.now();
  timerInterval=setInterval(()=>{const el=document.getElementById("timer-display");if(el)el.textContent=fmtSecs(timerSecs());},1000);
  render();
}
function timerStop(){
  if(!state.timer.rodando) return;
  state.timer.pausado=timerSecs();state.timer.rodando=false;
  clearInterval(timerInterval);render();
}
function timerReset(){clearInterval(timerInterval);state.timer={...state.timer,rodando:false,inicio:null,pausado:0};render();}
function timerSalvar(){
  const secs=timerSecs(),mins=Math.ceil(secs/60);
  const kmN=parseFloat(state.timer.corridaAtiva.km)||0;
  const valorN=parseFloat(state.timer.corridaAtiva.valor)||0;
  const custo=kmN*state.custoKm+state.custoFixoDia/10*(mins/60+kmN/30);
  const c={id:Date.now(),data:today(),hora:nowHour(),plataforma:state.timer.corridaAtiva.plat,tipo:state.timer.corridaAtiva.tipo,km:kmN,valorBruto:valorN,gorjeta:0,espera:mins,paradas:1,obs:"Via timer",valorTotal:valorN,custo,lucro:valorN-custo};
  state.corridas.unshift(c);save();
  clearInterval(timerInterval);
  state.timer={rodando:false,inicio:null,pausado:0,corridaAtiva:{plat:"uber",tipo:"Entrega simples",km:"",valor:""}};
  goTab("dash");
}

// CALCULADORA
function calcLucroQuick(){
  const kmN=parseFloat(state.calc.km)||0,valorN=parseFloat(state.calc.valor)||0,espN=parseFloat(state.calc.espera)||0;
  const custoVar=kmN*state.custoKm,custoProp=state.custoFixoDia/10*(espN/60+kmN/30),custo=custoVar+custoProp;
  const lucro=valorN-custo,lucroH=espN>0?lucro/(espN/60):null,minimo=custo*1.3;
  return {kmN,valorN,custo,custoVar,custoProp,lucro,lucroH,minimo,rentavel:lucro>0};
}
function renderCalc(){
  const r=(state.calc.km&&state.calc.valor)?calcLucroQuick():null;
  const platOpts=PLATFORMS.map(p=>`<option value="${p.id}"${state.calc.plat===p.id?" selected":""}>${p.emoji} ${p.label}</option>`).join("");
  return `
  <div class="gap-20">
    <div class="info-box">🚦 <strong>Alerta rápido:</strong> coloque o valor e km antes de aceitar — o app diz se vale em segundos!</div>
    <div class="form-grid">
      <div class="form-group"><label>Km percorridos</label><input type="number" value="${state.calc.km}" placeholder="Ex: 12.5" oninput="state.calc.km=this.value;renderResult()"></div>
      <div class="form-group"><label>Valor recebido (R$)</label><input type="number" value="${state.calc.valor}" placeholder="Ex: 28.00" oninput="state.calc.valor=this.value;renderResult()"></div>
      <div class="form-group"><label>Tempo total (min)</label><input type="number" value="${state.calc.espera}" placeholder="Ex: 45" oninput="state.calc.espera=this.value;renderResult()"></div>
      <div class="form-group"><label>Nº de paradas</label><input type="number" value="${state.calc.corridas}" placeholder="Ex: 2" oninput="state.calc.corridas=this.value"></div>
    </div>
    <div class="form-group"><label>Plataforma</label><select oninput="state.calc.plat=this.value">${platOpts}</select></div>
    <div id="calc-result">${r?resultHTML(r):""}</div>
  </div>`;
}
function resultHTML(r){
  const cls=r.rentavel?"ok":"fail",icon=r.rentavel?"✅ Corrida rentável":"❌ Corrida no prejuízo",color=r.rentavel?"var(--green)":"var(--red)";
  const rows=[["💰 Recebido",brl(r.valorN),"var(--text)"],["🛣️ Custo km",brl(r.custoVar),"var(--red)"],["⏱️ Custo tempo",brl(r.custoProp),"var(--red)"],["📊 Custo total",brl(r.custo),"var(--red)"],["💵 Lucro líquido",brl(r.lucro),r.lucro>0?"var(--green)":"var(--red)"],r.lucroH!=null?["⏰ R$/hora",brl(r.lucroH),"var(--accent)"]:null].filter(Boolean).map(([l,v,c])=>`<div class="result-row"><span style="color:var(--muted)">${l}</span><span style="color:${c};font-weight:700">${v}</span></div>`).join("");

}
function renderResult(){const el=document.getElementById("calc-result");if(!el)return;const r=(state.calc.km&&state.calc.valor)?calcLucroQuick():null;el.innerHTML=r?resultHTML(r):"";}

function lerReg(){

function salvarCorrida(){
  lerReg();

  const gorjeta=parseFloat(state.reg.gorjeta)||0;

    paradas:parseInt(state.reg.paradas)||1,obs:state.reg.obs||"",

  };
  state.corridas.unshift(c);save();

}

  const tLucro=filtradas.reduce((s,c)=>s+c.lucro,0),tKm=filtradas.reduce((s,c)=>s+c.km,0),tBruto=filtradas.reduce((s,c)=>s+c.valorTotal,0);
  const cards=filtradas.length===0?`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Nenhuma corrida</div></div>`:

function delCorrida(id){if(!confirm("Excluir esta corrida?"))return;state.corridas=state.corridas.filter(c=>c.id!==id);save();render();}

// ANÁLISE
function renderAnalise(){
  if(state.corridas.length<3) return `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Dados insuficientes</div><div style="margin-top:8px">Registre pelo menos 3 corridas para ver análises.</div></div>`;
  const limite=new Date();limite.setDate(limite.getDate()-60);
  const rec=state.corridas.filter(c=>new Date(c.data)>=limite);

  // Por dia da semana
  const porDS=Array.from({length:7},()=>({lucro:0,count:0}));
  rec.forEach(c=>{const d=new Date(c.data+"T12:00:00").getDay();porDS[d].lucro+=c.lucro;porDS[d].count++;});
  const maxDS=Math.max(...porDS.map(d=>d.count>0?d.lucro/d.count:0),1);

  // Por horário
  const corridasComHora=rec.filter(c=>c.hora&&c.hora!=="00:00");
  const porHora={};
  corridasComHora.forEach(c=>{const h=parseInt(c.hora.split(":")[0]);const faixa=h<7?"🌙 Madrugada":h<12?"☀️ Manhã":h<15?"🍽️ Almoço":h<18?"🌤️ Tarde":h<21?"🌆 Noite":"🌙 Noite tarde";if(!porHora[faixa])porHora[faixa]={lucro:0,count:0,min:0};porHora[faixa].lucro+=c.lucro;porHora[faixa].count++;porHora[faixa].min+=c.espera||0;});

  // Por plataforma — COMPARATIVO COMPLETO
  const porPlat=PLATFORMS.map(p=>{
    const cs=rec.filter(c=>c.plataforma===p.id);
    if(cs.length===0) return null;
    const lucro=cs.reduce((s,c)=>s+c.lucro,0);
    const bruto=cs.reduce((s,c)=>s+c.valorTotal,0);
    const km2=cs.reduce((s,c)=>s+c.km,0);
    const mins=cs.reduce((s,c)=>s+(c.espera||0),0);
    const media=lucro/cs.length;
    const lucroKm=km2>0?lucro/km2:0;
    const lucroHora=mins>0?lucro/(mins/60):0;
    const ticketMedio=bruto/cs.length;
    return {...p,count:cs.length,lucro,bruto,km:km2,mins,media,lucroKm,lucroHora,ticketMedio};
  }).filter(Boolean).sort((a,b)=>b.lucroHora-a.lucroHora);

  const melhorDia=porDS.map((d,i)=>({...d,nome:DIAS_SEMANA[i]})).filter(d=>d.count>0).sort((a,b)=>(b.lucro/b.count)-(a.lucro/a.count))[0];
  const melhorHora=Object.entries(porHora).sort((a,b)=>(b[1].lucro/b[1].count)-(a[1].lucro/a[1].count))[0];
  const maxPlat=Math.max(...porPlat.map(p=>p.lucroHora),1);
  const maxMedia=Math.max(...porPlat.map(p=>p.media),1);

  const diasHTML=DIAS_SEMANA.map((nome,i)=>{
    const d=porDS[i],media=d.count>0?d.lucro/d.count:0,pct=maxDS>0?media/maxDS*100:0;
    const cor=pct>70?"var(--green)":pct>40?"var(--accent)":pct>0?"var(--blue)":"var(--border)";
    return `<div style="text-align:center"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">${nome}</div><div style="height:60px;display:flex;align-items:flex-end;justify-content:center"><div style="width:28px;background:${cor};border-radius:4px 4px 0 0;height:${pct>0?Math.max(pct,8):4}%"></div></div><div style="font-size:10px;color:var(--muted);margin-top:3px">${d.count>0?brl(media):"—"}</div></div>`;
  }).join("");

  // Ranking por R$/hora (principal métrica de comparação)
  const platRankHTML=porPlat.map((p,i)=>{
    const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
    const destaque=i===0;
    const pctH=p.lucroHora/maxPlat*100;
    const pctM=p.media/maxMedia*100;
    return `
    <div style="background:${destaque?"rgba(46,204,113,.06)":"var(--input)"};border:1px solid ${destaque?"var(--green)":"var(--border)"};border-radius:14px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:20px">${medal}</span>
          ${platBadge(p.id)}
          <span style="color:var(--muted);font-size:12px">${p.count} corridas</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:800;color:${destaque?"var(--green)":"var(--text)"}">
            ${brl(p.lucroHora)}<span style="font-size:11px;font-weight:400;color:var(--muted)">/h</span>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;text-align:center">
        <div style="background:var(--card);border-radius:8px;padding:6px">
          <div style="color:var(--muted)">Média/corrida</div>
          <div style="font-weight:700;color:var(--accent)">${brl(p.media)}</div>
        </div>
        <div style="background:var(--card);border-radius:8px;padding:6px">
          <div style="color:var(--muted)">R$/km</div>
          <div style="font-weight:700;color:var(--blue)">${brl(p.lucroKm)}</div>
        </div>
        <div style="background:var(--card);border-radius:8px;padding:6px">
          <div style="color:var(--muted)">Ticket médio</div>
          <div style="font-weight:700;color:var(--purple)">${brl(p.ticketMedio)}</div>
        </div>
      </div>
      <div style="margin-top:10px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">R$/hora</div>
        <div class="bar-wrap"><div class="bar-fill" style="background:${destaque?"var(--green)":"var(--blue)"};width:${pctH}%"></div></div>
      </div>
    </div>`;
  }).join("");

  const horaRows=Object.entries(porHora).sort((a,b)=>(b[1].lucro/b[1].count)-(a[1].lucro/a[1].count)).map(([f,d])=>`
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span>${f}</span>
      <div style="text-align:right">
        <div style="color:var(--accent);font-weight:700">${brl(d.lucro/d.count)}/corrida</div>
        <div style="color:var(--muted);font-size:11px">${d.count} corridas</div>
      </div>
    </div>`).join("");

  // Veredicto de qual plataforma usar
  const veredito = porPlat.length>=2 ? (()=>{
    const top=porPlat[0],sec=porPlat[1];
    const diff=((top.lucroHora-sec.lucroHora)/sec.lucroHora*100).toFixed(0);
    return `<div style="background:rgba(46,204,113,.07);border:1px solid var(--green);border-radius:14px;padding:14px 18px">
      <div class="stat-label">🤖 Veredicto — baseado nos seus dados</div>
      <div style="font-size:16px;font-weight:800;color:var(--green);margin-top:6px">${top.emoji} ${top.label} paga ${diff}% mais por hora</div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px">
        ${top.label}: ${brl(top.lucroHora)}/h · ${top.label==="Uber Flash"?"Foque aqui por enquanto e use "+sec.label+" nos horários fracos.":"Continue testando as duas para confirmar a tendência."}
      </div>
    </div>`;
  })() : "";

  // ── ROTAS RUINS ──────────────────────────────────────────
  const minimoRentavel = state.custoKm; // R$ mínimo por km para ser rentável
  const rotasRuins = rec.filter(c => c.lucro <= 0);
  const rotasOk    = rec.filter(c => c.lucro > 0);
  const prejuizoTotal = rotasRuins.reduce((s,c) => s + Math.abs(c.lucro), 0);
  const custoOportunidade = rotasRuins.reduce((s,c) => s + Math.abs(c.lucro) + c.custo, 0);

  // Rotas ruins por plataforma
  const ruinsPorPlat = PLATFORMS.map(p => {
    const ruins = rotasRuins.filter(c => c.plataforma === p.id);
    const total  = rec.filter(c => c.plataforma === p.id).length;
    return ruins.length > 0 ? {...p, ruins: ruins.length, total, pct: (ruins.length/Math.max(total,1)*100).toFixed(0), prejuizo: ruins.reduce((s,c)=>s+Math.abs(c.lucro),0)} : null;
  }).filter(Boolean).sort((a,b) => b.ruins - a.ruins);

  // Rotas ruins por horário
  const ruinsHora = {};
  rotasRuins.filter(c=>c.hora&&c.hora!=="00:00").forEach(c => {
    const h = parseInt(c.hora.split(":")[0]);
    const f = h<7?"🌙 Madrugada":h<12?"☀️ Manhã":h<15?"🍽️ Almoço":h<18?"🌤️ Tarde":h<21?"🌆 Noite":"🌙 Noite tarde";
    if(!ruinsHora[f]) ruinsHora[f]={count:0,prejuizo:0};
    ruinsHora[f].count++; ruinsHora[f].prejuizo+=Math.abs(c.lucro);
  });

  // Top 3 piores corridas
  const piores = [...rotasRuins].sort((a,b)=>a.lucro-b.lucro).slice(0,3);

  const ruinsPlatHTML = ruinsPorPlat.map(p => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <div>${platBadge(p.id)}<span style="color:var(--muted);font-size:12px;margin-left:6px">${p.ruins} de ${p.total} corridas (${p.pct}%)</span></div>
      <span style="color:var(--red);font-weight:700;font-size:13px">-${brl(p.prejuizo)}</span>
    </div>`).join("");

  const ruinsHoraHTML = Object.entries(ruinsHora).map(([f,d]) => `
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span>${f} <span style="color:var(--muted)">(${d.count}x)</span></span>
      <span style="color:var(--red);font-weight:700">-${brl(d.prejuizo)}</span>
    </div>`).join("");

  const pioresHTML = piores.map(c => `
    <div style="background:rgba(231,76,60,.05);border:1px solid var(--red);border-radius:12px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>${platBadge(c.plataforma)}<div style="color:var(--muted);font-size:12px;margin-top:3px">${c.tipo} · ${c.data}${c.hora&&c.hora!=="00:00"?" · "+c.hora:""}</div></div>
        <div style="text-align:right">
          <div style="color:var(--red);font-weight:800;font-size:16px">${brl(c.lucro)}</div>
          <div style="color:var(--muted);font-size:11px">${kmStr(c.km)} · ${brl(c.valorTotal)} bruto</div>
        </div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">
        💡 Precisaria de <strong style="color:var(--accent)">${brl(c.custo * 1.3)}</strong> para essa rota valer (você recebeu ${brl(c.valorTotal)})
      </div>
    </div>`).join("");

  const rotasRuinsSection = rotasRuins.length === 0 ? `
    <div style="background:rgba(46,204,113,.07);border:1px solid var(--green);border-radius:14px;padding:16px 18px;text-align:center">
      <div style="font-size:28px">🎉</div>
      <div style="font-weight:800;color:var(--green);font-size:16px;margin-top:6px">Nenhuma rota no prejuízo!</div>
      <div style="color:var(--muted);font-size:13px;margin-top:4px">Todas as suas corridas registradas foram rentáveis.</div>
    </div>` : `
    <div class="card">
      <div class="section-title">🚨 Análise de rotas ruins</div>

      <!-- Resumo -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div style="background:rgba(231,76,60,.07);border-radius:10px;padding:10px;text-align:center">
          <div style="color:var(--muted);font-size:11px">Rotas ruins</div>
          <div style="color:var(--red);font-weight:800;font-size:20px">${rotasRuins.length}</div>
          <div style="color:var(--muted);font-size:10px">de ${rec.length} total</div>
        </div>
        <div style="background:rgba(231,76,60,.07);border-radius:10px;padding:10px;text-align:center">
          <div style="color:var(--muted);font-size:11px">Prejuízo total</div>
          <div style="color:var(--red);font-weight:800;font-size:16px">${brl(prejuizoTotal)}</div>
          <div style="color:var(--muted);font-size:10px">nos custos</div>
        </div>
        <div style="background:rgba(231,76,60,.07);border-radius:10px;padding:10px;text-align:center">
          <div style="color:var(--muted);font-size:11px">Taxa de acerto</div>
          <div style="color:${rotasOk.length/rec.length>0.8?"var(--green)":"var(--accent)"};font-weight:800;font-size:18px">${(rotasOk.length/rec.length*100).toFixed(0)}%</div>
          <div style="color:var(--muted);font-size:10px">corridas ok</div>
        </div>
      </div>

      <!-- Custo de oportunidade -->
      <div style="background:rgba(231,76,60,.06);border-radius:10px;padding:12px;margin-bottom:16px">
        <div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px">💸 Custo de oportunidade</div>
        <div style="font-size:18px;font-weight:800;color:var(--red);margin-top:4px">${brl(custoOportunidade)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Você gastou ${brl(prejuizoTotal)} a mais do que recebeu nessas rotas + ${brl(custoOportunidade-prejuizoTotal)} em custos do veículo sem retorno</div>
      </div>

      ${ruinsPorPlat.length>0?`<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:8px">Por plataforma</div>${ruinsPlatHTML}</div>`:""}
      ${Object.keys(ruinsHora).length>0?`<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:8px">Por horário</div>${ruinsHoraHTML}</div>`:""}
      ${piores.length>0?`<div><div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:8px">🔴 Piores corridas</div>${pioresHTML}</div>`:""}
    </div>`;

  return `
  <div class="gap-20">
    ${melhorDia?`<div style="background:rgba(46,204,113,.07);border:1px solid var(--green);border-radius:14px;padding:14px 18px"><div class="stat-label">🏆 Melhor dia da semana</div><div style="font-size:24px;font-weight:800;color:var(--green);margin-top:4px">${melhorDia.nome}</div><div style="color:var(--muted);font-size:13px">Média ${brl(melhorDia.lucro/melhorDia.count)}/corrida (${melhorDia.count} registros)</div></div>`:""}
    ${melhorHora?`<div style="background:rgba(245,166,35,.07);border:1px solid var(--accent);border-radius:14px;padding:14px 18px"><div class="stat-label">⏰ Melhor horário</div><div style="font-size:24px;font-weight:800;color:var(--accent);margin-top:4px">${melhorHora[0]}</div><div style="color:var(--muted);font-size:13px">Média ${brl(melhorHora[1].lucro/melhorHora[1].count)}/corrida</div></div>`:""}
    <div class="card"><div class="section-title">📅 Por dia da semana</div><div style="display:flex;justify-content:space-around;align-items:flex-end;height:100px">${diasHTML}</div></div>
    ${porPlat.length>0?`<div class="card"><div class="section-title">🏆 Comparativo de plataformas — R$/hora</div><div style="color:var(--muted);font-size:12px;margin-bottom:12px">Baseado nas suas corridas reais. Quanto maior o R$/hora, melhor vale seu tempo.</div>${platRankHTML}</div>`:""}
    ${veredito}
    ${rotasRuinsSection}
    ${corridasComHora.length>1?`<div class="card"><div class="section-title">⏰ Por período do dia</div>${horaRows}</div>`:""}
  </div>`;
}

// GASTOS
function renderGastos(){
  const catOpts=CAT_GASTOS.map(c=>`<option${state.regGasto.categoria===c?" selected":""}>${c}</option>`).join("");
  const mes=mesAtual(),gastosMes=state.gastos.filter(g=>g.data.startsWith(mes)),totalMes=gastosMes.reduce((s,g)=>s+g.valor,0);
  const lucroMes=state.corridas.filter(c=>c.data.startsWith(mes)).reduce((s,c)=>s+c.lucro,0),lucroReal=lucroMes-totalMes;
  const porCat={};gastosMes.forEach(g=>{porCat[g.categoria]=(porCat[g.categoria]||0)+g.valor;});
  const maxCat=Math.max(...Object.values(porCat),1);
  const alertas=PREVENTIVOS.map(p=>{const ultimo=state.gastos.filter(g=>g.preventivo===p.id).sort((a,b)=>b.kmRegistro-a.kmRegistro)[0];const kmU=ultimo?ultimo.kmRegistro:0,kmF=(kmU+p.kmIntervalo)-state.kmAtual,pct=Math.min(100,Math.max(0,(state.kmAtual-kmU)/p.kmIntervalo*100)),status=pct>=100?"over":pct>=80?"warn":"ok";return {...p,kmU,kmF,pct,status};});
  const alertasHTML=alertas.map(a=>`<div class="alerta-card alerta-${a.status}"><div style="flex:1"><div style="font-weight:700;font-size:14px">${a.emoji} ${a.label}</div><div style="color:var(--muted);font-size:12px;margin-top:2px">${a.kmU>0?`Último: ${a.kmU.toLocaleString()} km · `:"Nunca feito · "}${a.kmF>0?`Faltam ${a.kmF.toLocaleString()} km`:`<span style="color:var(--red);font-weight:700">VENCIDO ${Math.abs(a.kmF).toLocaleString()} km atrás</span>`}</div><div class="prog-wrap"><div class="prog-fill" style="background:${a.status==="ok"?"var(--green)":a.status==="warn"?"var(--accent)":"var(--red)"};width:${a.pct}%"></div></div></div><button style="background:none;border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;margin-left:10px;padding:4px 8px;border-radius:8px" onclick="marcarFeito('${a.id}','${a.label}')">✓ Feito</button></div>`).join("");
  const historico=[...state.gastos].sort((a,b)=>new Date(b.data)-new Date(a.data)).slice(0,15);
  const histHTML=historico.map(g=>`<div class="hist-card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:14px">${g.categoria}</div><div style="color:var(--muted);font-size:12px">${g.desc||""}${g.desc?" · ":""}📅 ${g.data}${g.kmRegistro?" · "+g.kmRegistro.toLocaleString()+" km":""}</div></div><div style="display:flex;align-items:center;gap:8px"><div style="color:var(--red);font-weight:800;font-size:16px">${brl(g.valor)}</div><button class="btn btn-red-outline btn-sm" onclick="delGasto(${g.id})">🗑️</button></div></div></div>`).join("");
  const catBars=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:13px"><span>${cat}</span><span style="color:var(--red);font-weight:700">${brl(val)}</span></div><div class="bar-wrap"><div class="bar-fill" style="background:var(--red);width:${val/maxCat*100}%"></div></div></div>`).join("");
  return `
  <div class="gap-20">
    <div class="stat-row"><div class="stat-card"><div class="stat-label">Gastos no mês</div><div class="stat-value" style="color:var(--red)">${brl(totalMes)}</div><div class="stat-sub">${gastosMes.length} registros</div></div><div class="stat-card"><div class="stat-label">Lucro real</div><div class="stat-value" style="color:${lucroReal>0?"var(--green)":"var(--red)"}">${brl(lucroReal)}</div><div class="stat-sub">após gastos</div></div></div>
    ${catBars?`<div class="card"><div class="section-title">📊 Por categoria (mês)</div>${catBars}</div>`:""}
    <div class="card"><div class="section-title">🚗 Quilometragem atual</div><div style="display:flex;gap:10px;align-items:flex-end"><div class="form-group" style="flex:1"><label>KM atual</label><input type="number" id="km-atual" value="${state.kmAtual||""}" placeholder="Ex: 45000"></div><button class="btn btn-accent btn-sm" onclick="salvarKm()">Salvar</button></div></div>
    <div class="card"><div class="section-title">🔧 Manutenção preventiva</div>${alertasHTML}</div>
    <div class="card"><div class="section-title">➕ Registrar gasto</div><div class="form-grid"><div class="form-group"><label>Data</label><input type="date" value="${state.regGasto.data}" oninput="state.regGasto.data=this.value"></div><div class="form-group"><label>Categoria</label><select oninput="state.regGasto.categoria=this.value">${catOpts}</select></div><div class="form-group"><label>Valor (R$)</label><input type="number" value="${state.regGasto.valor}" placeholder="Ex: 150.00" oninput="state.regGasto.valor=this.value"></div><div class="form-group"><label>KM ao registrar</label><input type="number" value="${state.regGasto.km}" placeholder="Ex: 45200" oninput="state.regGasto.km=this.value"></div><div class="form-group full"><label>Descrição</label><input type="text" value="${state.regGasto.desc}" placeholder="Ex: Troca de óleo 5W30" oninput="state.regGasto.desc=this.value"></div></div><button class="btn btn-accent" style="margin-top:14px" id="btn-gasto" onclick="salvarGasto()">💾 Registrar gasto</button></div>
    ${historico.length>0?`<div class="card"><div class="section-title">📋 Últimos gastos</div>${histHTML}</div>`:""}
  </div>`;
}
function salvarKm(){const v=parseFloat(document.getElementById("km-atual").value)||0;state.kmAtual=v;save();render();}
function marcarFeito(id,label){state.gastos.unshift({id:Date.now(),data:today(),categoria:"Manutenção",desc:label,valor:0,kmRegistro:state.kmAtual||0,preventivo:id});save();render();}
function salvarGasto(){
  if(!state.regGasto.valor)return;
  const g={id:Date.now(),data:state.regGasto.data,categoria:state.regGasto.categoria,desc:state.regGasto.desc,valor:parseFloat(state.regGasto.valor)||0,kmRegistro:parseFloat(state.regGasto.km)||state.kmAtual||0,preventivo:null};
  for(const p of PREVENTIVOS){if(g.desc.toLowerCase().includes(p.label.toLowerCase().split(" ")[0])){g.preventivo=p.id;break;}}
  state.gastos.unshift(g);if(g.kmRegistro>state.kmAtual)state.kmAtual=g.kmRegistro;save();
  state.regGasto={data:today(),categoria:"Combustível",desc:"",valor:"",km:""};
  const btn=document.getElementById("btn-gasto");if(btn){btn.textContent="✅ Salvo!";btn.className="btn btn-green";}
  setTimeout(()=>render(),1000);
}
function delGasto(id){if(!confirm("Excluir?"))return;state.gastos=state.gastos.filter(g=>g.id!==id);save();render();}

// CONFIG
function renderCfg(){
  return `<div class="gap-20"><div class="info-box">💡 Esses valores são usados em todos os cálculos. Ajuste conforme seus gastos reais.</div><div class="form-grid"><div class="form-group"><label>Custo por km (R$)</label><input type="number" id="cfg-ck" value="${state.custoKm}" step="0.01" placeholder="0.65"></div><div class="form-group"><label>Custo fixo diário (R$)</label><input type="number" id="cfg-cf" value="${state.custoFixoDia}" placeholder="25"></div><div class="form-group"><label>Meta diária (R$)</label><input type="number" id="cfg-md" value="${state.metaDiaria}" placeholder="150"></div><div class="form-group"><label>Meta mensal (R$)</label><input type="number" id="cfg-mm" value="${state.metaMensal}" placeholder="3000"></div></div><div class="info-box-blue"><strong style="color:var(--text)">📌 Como calcular seu custo/km:</strong><br>• Some combustível + manutenção + seguro + depreciação<br>• Divida pelo total de km do mês<br>• Moto: 0,30–0,50 · Carro popular: 0,55–0,75 · SUV: 0,80–1,10</div><button class="btn btn-accent" id="btn-cfg" onclick="salvarConfig()">💾 Salvar configurações</button><button class="btn btn-red-outline" onclick="limparTudo()" style="margin-top:0">🗑️ Apagar todos os registros</button></div>`;
}
function salvarConfig(){
  state.custoKm=parseFloat(document.getElementById("cfg-ck").value)||0.65;state.custoFixoDia=parseFloat(document.getElementById("cfg-cf").value)||25;
  state.metaDiaria=parseFloat(document.getElementById("cfg-md").value)||150;state.metaMensal=parseFloat(document.getElementById("cfg-mm").value)||3000;
  save();const btn=document.getElementById("btn-cfg");btn.textContent="✅ Configurações salvas!";btn.className="btn btn-green";
  setTimeout(()=>{btn.textContent="💾 Salvar configurações";btn.className="btn btn-accent";},2000);
}
function limparTudo(){if(!confirm("Apagar TUDO? Não tem volta!"))return;state.corridas=[];state.gastos=[];state.kmAtual=0;save();render();}

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("install-banner").style.display="block";});
function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById("install-banner").style.display="none";});}
window.addEventListener("appinstalled",()=>{document.getElementById("install-banner").style.display="none";});
if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{});}

load();render();
</script>
